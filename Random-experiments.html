  <script>
document.addEventListener("DOMContentLoaded", function() {
    const navLinks = document.querySelectorAll('.nav-link');
    const currentPath = window.location.pathname.split("/").pop();
    const bodySection = document.body.getAttribute('data-section');

    navLinks.forEach(link => {
        const linkPath = link.getAttribute('href');

        // Caso 1: Corrispondenza esatta del file
        if (linkPath === currentPath) {
            link.classList.add('active');
        } 
        
        // Caso 2: Siamo in una sottopagina (grazie al data-section sul body)
        if (bodySection === 'portfolio' && linkPath === 'portfolio.html') {
            link.classList.add('active');
        }
    });
});
</script>
